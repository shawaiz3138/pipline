name: CI/CD Pipeline with Secrets

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        run: echo "Building application..."

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Test
        run: echo "Running tests..."

  deploy:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Deploy with secret
        env:
          AWS_KEY: ${{ secrets.AWS_ACCESS_KEY }}
        run: |
          echo "Deploying securely..."
          echo "Secret is hidden: $AWS_KEY"
          echo "Deployment complete!"
